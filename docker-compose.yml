services:
  db:
    image: postgres:18.4-alpine
    container_name: wc_db
    restart: always
    environment:
      POSTGRES_USER: wc_user
      POSTGRES_PASSWORD: wc_password
      POSTGRES_DB: wc_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - wc-network

  adminer:
    image: adminer:5.4.2
    container_name: wc_adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - wc-network

  api:
    build: 
      context: ./api
      target: builder
    container_name: wc_api
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
      - ./api/uploads:/usr/src/app/uploads
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=wc_user
      - POSTGRES_PASSWORD=wc_password
      - POSTGRES_DB=wc_db
    command: npm run start:dev
    depends_on:
      - db
    networks:
      - wc-network

  app:
    build: ./app
    container_name: wc_app
    volumes:
      - ./app:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "4200:4200"
    environment:
      - DOCKER_ENV=true
    command: ng serve --host 0.0.0.0 --poll 2000
    depends_on:
      - api
    networks:
      - wc-network

volumes:
  db_data:

networks:
  wc-network:
    driver: bridge